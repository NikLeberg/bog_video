source [find interface/altera-usb-blaster.cfg]

# Silence unset speed warning, blaster uses fixed speed
adapter speed 0 

# Altera Cyclone IV E FPGA
if { [info exists CHIPNAME] } {
    set _CHIPNAME $CHIPNAME
} else {
    set _CHIPNAME cycloneive
}

# Subsidiary TAP: fpga (tap)
# EP4CE15F23C8 has id 0x020f20dd
jtag newtap $_CHIPNAME tap -irlen 10 -expected-id 0x020f20dd

# NEORV32 target https://github.com/stnolting/neorv32
set _TARGETNAME $_CHIPNAME.neorv32_cpu
target create $_TARGETNAME riscv -chain-position $_CHIPNAME.tap

# We use the Altera JTAG atom that only exposes USR0 & USR1, remap registers.
# riscv set_ir idcode 0x09 inaccessible, handled by fpga tap
riscv set_ir dtmcs 0x00c
riscv set_ir dmi 0x00e

# Shutdown OpenOCD when GDB connection terminates
$_TARGETNAME configure -event gdb-detach {shutdown}

init
halt
